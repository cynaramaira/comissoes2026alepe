    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>

                        { nome: "Sileno Guedes", partido: "PSB", alinhamento: "Oposição", foto: "sileno-guedes" }
                    ],
                    Antes: [
                        { nome: "Antônio Moraes", partido: "PP", alinhamento: "Base", foto: "antonio-moraes" },
                        { nome: "Mário Ricardo", partido: "REP", alinhamento: "Oposição", foto: "mario-ricardo" },
                        { nome: "Edson Vieira", partido: "UB", alinhamento: "Base", foto: "edson-vieira" },

                        { nome: "Waldemar Borges", partido: "MDB", alinhamento: "Oposição", foto: "waldemar-borges" },

                    Depois: [
                        { nome: "Antonio Coelho", partido: "UB", alinhamento: "Base", foto: "antonio-coelho" },
                        { nome: "Dannilo Godoy", partido: "PP", alinhamento: "Base", foto: "dannilo-godoy" },
                        { nome: "Débora Almeida", partido: "PSD", alinhamento: "Base", foto: "debora-almeida" },
                        { nome: "William Brigido", partido: "PSD", alinhamento: "Base", foto: "william-brigido" },
                        { nome: "Luciano Duque", partido: "POD", alinhamento: "Base", foto: "luciano-duque" },
                        { nome: "João de Nadegi", partido: "PV", alinhamento: "Base", foto: "joao-de-nadegi" },
                        { nome: "Alberto Feitosa", partido: "PL", alinhamento: "Oposição", foto: "coronel-alberto-feitosa" },
                        { nome: "Diogo Moraes", partido: "PSB", alinhamento: "Oposição", foto: "diogo-moraes" },
                        { nome: "Eriberto Filho", partido: "PSB", alinhamento: "Oposição", foto: "eriberto-filho" }
                    ],
                    Antes: [
                        { nome: "Antonio Coelho", partido: "UB", alinhamento: "Oposição", foto: "antonio-coelho" },
                        { nome: "Henrique Queiroz", partido: "PP", alinhamento: "Base", foto: "henrique-queiroz" },
                        { nome: "Gustavo Gouveia", partido: "SOLID", alinhamento: "Base", foto: "gustavo-gouveia" },
                        { nome: "Dani Portela", partido: "PSOL", alinhamento: "Oposição", foto: "dani-portela" },
                        { nome: "Mário Ricardo", partido: "REP", alinhamento: "Oposição", foto: "mario-ricardo" },
                        { nome: "João de Nadegi", partido: "PV", alinhamento: "Base", foto: "joao-de-nadegi" },

                },
                Administração: {
                    titulo: "Comissão de Administração",
                    descricao: "O colegiado debate a gestão do Estado. Os projetos tratam da organização direta dos serviços públicos.",

                        { nome: "Izaías Régis", partido: "PSD", alinhamento: "Base", foto: "izaias-regis" },
                        { nome: "Antonio Coelho", partido: "UB", alinhamento: "Base", foto: "antonio-coelho" },

                        { nome: "Wanderson Florêncio", partido: "POD", alinhamento: "Base", foto: "wanderson-florencio" },

                        { nome: "Nino de Enoque", partido: "PL", alinhamento: "Base", foto: "nino-de-enoque" },
                        { nome: "Waldemar Borges", partido: "PSB", alinhamento: "Oposição", foto: "waldemar-borges" }
                    ],
                    Antes: [
                        { nome: "Izaías Régis", partido: "PSDB", alinhamento: "Base", foto: "izaias-regis" },
                        { nome: "Antonio Coelho", partido: "UB", alinhamento: "Oposição", foto: "antonio-coelho" },
                        { nome: "Junior Matuto", partido: "PRD", alinhamento: "Oposição", foto: "junior-matuto" },
                        { nome: "Jeferson Timóteo", partido: "PP", alinhamento: "Base", foto: "jeferson-timoteo" },
                        { nome: "Joaquim Lira", partido: "PV", alinhamento: "Base", foto: "joaquim-lira" },
                        { nome: "Nino de Enoque", partido: "PL", alinhamento: "Base", foto: "nino-de-enoque" },
                        { nome: "Waldemar Borges", partido: "MDB", alinhamento: "Oposição", foto: "waldemar-borges" }
                    ]
                }
            };

            useEffect(() => {
                const updateIcons = () => {
                    if (window.lucide) window.lucide.createIcons();
                };
                updateIcons();
                const timer = setTimeout(updateIcons, 100);
                return () => clearTimeout(timer);
            }, [comissao, periodo]);

            const handlePeriodoChange = (novoPeriodo) => {
                if (periodo === novoPeriodo) return;
                setAnimating(true);
                setTimeout(() => {
                    setPeriodo(novoPeriodo);
                    setAnimating(false);
                }, 300);
            };

            const getPlacar = () => {
                const membros = data[comissao][periodo];
                const base = membros.filter(m => m.alinhamento === 'Base').length;
                const oposicao = membros.filter(m => m.alinhamento === 'Oposição').length;
                return { base, oposicao };
            };

            const placar = getPlacar();

            return React.createElement('div', { className: 'flex flex-col min-h-screen items-center justify-center py-4 bg-slate-100' },
                React.createElement('div', { 
                    className: 'w-full max-w-[800px] aspect-[4/5] bg-white shadow-2xl rounded-3xl overflow-hidden flex flex-col relative border border-slate-200' 
                },
                    // Header
                    React.createElement('header', { className: 'bg-[#024796] p-6 text-white text-center relative flex-shrink-0' },

                                onClick: () => setComissao(key),
                                className: `flex-1 py-5 text-base font-black transition-all ${
                                    comissao === key 
                                    ? 'text-[#024796] border-b-4 border-[#024796] bg-white'

                                }`

                        )

                            onClick: () => handlePeriodoChange('Depois'),
                            className: `px-10 py-3 rounded-full text-base font-bold transition-all shadow-md ${

                                ? 'bg-[#024796] text-white scale-105' 
                                : 'bg-white text-slate-500 border border-slate-200'

                                    React.createElement('span', { className: 'text-sm font-black text-[#024796] uppercase tracking-wider' }, 'Base Governista')

</body>
</html>
